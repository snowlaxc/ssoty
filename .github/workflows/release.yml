name: release
on:
  push:
    # Full semver tags only (v1.2.3) — NOT the floating major tag (v0), so moving
    # v0 doesn't re-trigger a duplicate publish.
    tags: ["v*.*.*"]

# PyPI publish uses OIDC Trusted Publishing (no long-lived token).
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for the PII gate
      - uses: astral-sh/setup-uv@v5
      - name: PII gate (block publishing real config)
        run: bash scripts/pii_gate.sh
      - name: Test
        run: uv run --extra dev pytest -q
      - name: Build
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true  # a re-run on an already-published version is a no-op, not an error

  github-release:
    needs: pypi-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
